[server]
headless = true
fileWatcherType = "poll"
# Single-page app — AI Analyst lives inside app.py navigation, not pages/
enableStaticServing = false

[browser]
gatherUsageStats = false

[logger]
level = "error"

[theme]
primaryColor = "#0F766E"
backgroundColor = "#F4F7FB"
secondaryBackgroundColor = "#FFFFFF"
textColor = "#1E293B"
font = "sans serif"

[theme.dark]
primaryColor = "#14B8A6"
backgroundColor = "#131A24"
secondaryBackgroundColor = "#1E293B"
textColor = "#E8EEF5"
